<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="/_sdk/element_sdk.js"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Bowlby+One+SC&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet"
    >

    <style>
        @keyframes shake {
            0%,100% { transform: translateY(0) }
            25% { transform: translateY(-12px) }
            50% { transform: translateY(4px) }
            75% { transform: translateY(-6px) }
        }

        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .shake {
            animation: shake 0.4s ease-out;
        }

        .pop-in {
            animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
        }

        .slide-up {
            animation: slideUp 0.4s ease-out;
        }

        .choice-btn:active {
            transform: scale(0.92);
        }
    </style>

    <style>
        body {
            box-sizing: border-box;
        }
    </style>

    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

<body class="h-full">
<div
    id="app"
    class="h-full w-full overflow-auto flex flex-col items-center"
    style="
        background:#1a1a2e;
        color:#e0e0e0;
        font-family:'DM Sans',sans-serif
    "
>

    <!-- Scoreboard -->
    <div class="w-full max-w-lg mx-auto pt-6 px-4">

        <h1
            id="title"
            class="text-center mb-4"
            style="
                font-family:'Bowlby One SC',cursive;
                color:#ff6b6b;
                font-size:28px
            "
        >
            ROCK PAPER SCISSORS
        </h1>

        <div
            class="flex justify-center items-center gap-6 rounded-2xl py-3 px-6"
            style="background:#16213e"
        >

            <div class="text-center">
                <div
                    class="text-xs uppercase tracking-widest"
                    style="color:#8892b0"
                >
                    You
                </div>

                <div
                    id="playerScore"
                    class="text-3xl font-bold"
                    style="color:#ff6b6b"
                >
                    0
                </div>
            </div>

            <div
                class="text-2xl"
                style="color:#333a50"
            >
                │
            </div>

            <div class="text-center">
                <div
                    class="text-xs uppercase tracking-widest"
                    style="color:#8892b0"
                >
                    CPU
                </div>

                <div
                    id="cpuScore"
                    class="text-3xl font-bold"
                    style="color:#4fc3f7"
                >
                    0
                </div>
            </div>

        </div>
    </div>

    <!-- Arena -->
    <div
        class="flex-1 flex flex-col items-center justify-center
        w-full max-w-lg px-4 py-6 gap-4"
    >

        <div
            id="result"
            class="text-center h-24 flex flex-col
            items-center justify-center"
        >
            <p
                class="text-lg"
                style="color:#8892b0"
            >
                Choose your weapon
            </p>
        </div>

        <!-- Choices -->
        <div class="flex gap-4 justify-center flex-wrap">

            <button
                onclick="play('rock')"
                class="choice-btn w-28 h-28 rounded-2xl
                flex flex-col items-center justify-center
                gap-1 text-5xl transition-all duration-150
                cursor-pointer border-2 hover:scale-105"
                style="
                    background:#16213e;
                    border-color:#ff6b6b55
                "
            >
                🪨
                <span
                    class="text-xs font-medium tracking-wide"
                    style="color:#8892b0"
                >
                    ROCK
                </span>
            </button>

            <button
                onclick="play('paper')"
                class="choice-btn w-28 h-28 rounded-2xl
                flex flex-col items-center justify-center
                gap-1 text-5xl transition-all duration-150
                cursor-pointer border-2 hover:scale-105"
                style="
                    background:#16213e;
                    border-color:#4fc3f755
                "
            >
                📄
                <span
                    class="text-xs font-medium tracking-wide"
                    style="color:#8892b0"
                >
                    PAPER
                </span>
            </button>

            <button
                onclick="play('scissors')"
                class="choice-btn w-28 h-28 rounded-2xl
                flex flex-col items-center justify-center
                gap-1 text-5xl transition-all duration-150
                cursor-pointer border-2 hover:scale-105"
                style="
                    background:#16213e;
                    border-color:#ffd93d55
                "
            >
                ✂️
                <span
                    class="text-xs font-medium tracking-wide"
                    style="color:#8892b0"
                >
                    SCISSORS
                </span>
            </button>

        </div>

        <button
            onclick="resetGame()"
            class="mt-4 px-5 py-2 rounded-full
            text-sm font-medium transition-all hover:opacity-80"
            style="
                background:#2a2a4a;
                color:#8892b0
            "
        >
            <i
                data-lucide="rotate-ccw"
                style="
                    width:14px;
                    height:14px;
                    display:inline-block;
                    vertical-align:middle;
                    margin-right:4px
                "
            ></i>
            Reset
        </button>

    </div>
</div>

<script>
const emojis = {
    rock:'🪨',
    paper:'📄',
    scissors:'✂️'
};

const choices = ['rock','paper','scissors'];

let pScore = 0;
let cScore = 0;

function play(player) {

    const cpu =
        choices[Math.floor(Math.random()*3)];

    let msg, cls;

    if(player===cpu){
        msg="It's a draw!";
        cls='#ffd93d';
    }

    else if(
        (player==='rock' && cpu==='scissors') ||
        (player==='paper' && cpu==='rock') ||
        (player==='scissors' && cpu==='paper')
    ){

        pScore++;
        msg='You win!';
        cls='#ff6b6b';

        document
            .getElementById('playerScore')
            .textContent = pScore;

    } else {

        cScore++;
        msg='CPU wins!';
        cls='#4fc3f7';

        document
            .getElementById('cpuScore')
            .textContent = cScore;
    }

    document
        .getElementById('result')
        .innerHTML=`
            <div class="flex items-center gap-4 pop-in text-5xl">
                ${emojis[player]}
                <span
                    style="
                        color:#333a50;
                        font-size:20px
                    "
                >
                    vs
                </span>
                ${emojis[cpu]}
            </div>

            <p
                class="slide-up text-lg font-bold mt-2"
                style="color:${cls}"
            >
                ${msg}
            </p>
        `;
}

function resetGame(){

    pScore=0;
    cScore=0;

    document.getElementById(
        'playerScore'
    ).textContent='0';

    document.getElementById(
        'cpuScore'
    ).textContent='0';

    document.getElementById(
        'result'
    ).innerHTML=
    '<p class="text-lg" style="color:#8892b0">Choose your weapon</p>';
}

lucide.createIcons();

</script>

</body>
</html>
